<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // Mount-prefix boot: when proxied via freeappstore.online/app/, the app lives under
      // /app/; on console.freeappstore.online it lives at the root. Set <base> before any
      // asset tag so relative URLs (./assets/...) resolve to the correct prefix on both.
      (function () {
        var apex = location.hostname === "freeappstore.online" || location.hostname === "www.freeappstore.online";
        document.write('<base href="' + (apex ? "/app/" : "/") + '">');
      })();
    </script>
    <script>
      // No-flash theme boot: apply stored preference (or system default) before paint.
      (function () {
        try {
          var p = localStorage.getItem("stores-theme");
          var dark = p === "dark" || ((!p || p === "system") && matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.dataset.theme = "dark";
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <meta name="description" content="Creator portal for FreeAppStore — build, manage, and publish free PWA apps with AI." />
    <link rel="icon" href="icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FreeAppStore Console" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Creator Console — FreeAppStore</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
